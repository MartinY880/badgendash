version: "3.8"

services:
  badge-scanner:
    build: .
    container_name: badge-scanner
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - badge-data:/app/data
      - badge-logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3002
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  badge-data:
    driver: local
  badge-logs:
    driver: local
